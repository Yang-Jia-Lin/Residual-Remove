# =============================================================================
# system.yaml — 端边协同系统仿真配置
#
# 这里定义的是"系统级"变量，与模型结构无关。
# 带宽场景参考 3G / WiFi / 5G 三档，用于 Exp1 传输开销和 Exp3 端到端延迟实验。
# =============================================================================

# 模拟的网络带宽场景（单位：Mbps）
# 1 Mbps  ≈ 弱网 / 3G 环境
# 10 Mbps ≈ 普通 WiFi
# 100 Mbps ≈ 5G / 局域网
bandwidth_mbps: [1, 10, 100]

# 协议握手和帧头的固定开销（单位：毫秒）
# 这个值是对 TCP 连接建立 + HTTP/gRPC 帧头的粗略估计
# 实测值应在真实设备部署时校准
protocol_overhead_ms: 2.0

# 边缘设备显存上限（单位：MB），用于 Exp3 多租户仿真
edge_memory_limit_mb: 4096

# 模拟的边缘设备计算延迟缩放系数（相对于开发机）
# 例如 Jetson Nano 的推理速度约为 RTX 3090 的 1/8
edge_compute_factor: 8.0