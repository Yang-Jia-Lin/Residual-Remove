# =============================================================================
# default_env.yaml — 全局环境配置
#
# 这个文件定义的是"环境级"变量：路径、硬件、随机性。
# 它不包含模型超参或实验逻辑——那些放在各自的 yaml 里。
#
# 使用方式（在 Python 中加载）：
#   import yaml
#   from pathlib import Path
#   cfg = yaml.safe_load(Path("_configs/default_env.yaml").read_text())
# =============================================================================

# ────────────────────────────── 可复现性 ──────────────────────────────
seed: 42

# ────────────────────────────── 硬件 ──────────────────────────────────
device: "cpu"                   
num_workers: 0
pin_memory: false

# ────────────────────────────── 路径 ──────────────────────────────────
paths:
  data_root: "Data"
  result_root: "Results"

# ────────────────────────────── 数据集 ────────────────────────────────
data:
  default_dataset: "cifar10"
  default_image_size: 32
  synthetic_if_missing: true 
  synthetic_train_size: 512
  synthetic_val_size:   256

# ────────────────────────────── 校准数据 ───────────────────────────────
calibration:
  num_samples: 1024             # 从训练集中抽取用于后训练校准的样本数
  batch_size:  64               # 校准阶段的 batch size（通常比训练小）

